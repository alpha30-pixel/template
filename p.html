<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  padding:0;
  background:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:500px;
  background:white;
  min-height:100vh;
  padding-bottom:20px;
}

/* HEADER */
.header{ position:relative; }
.bg-contain{ width:100%; display:block; }
.top-bar{
  position:absolute;
  bottom:10px;
  right:15px;
  color:white;
  font-weight:bold;
  font-size:20px;
  background:rgba(0,0,0,0.4);
  padding:5px 10px;
  border-radius:8px;
}

.header::after{
  content:"";
  display:block;
  height:15px;
  background:white;
  border-top-left-radius:100% 80px;
  border-top-right-radius:100% 80px;
}

/* SOCIAL */
.social-icons{
  display:flex;
  justify-content:space-between;
  padding:0 10px;
  margin-top:15px;
}

.social-icons a{
  flex:1;
  margin:0 5px;
  height:80px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  color:white;
  font-size:28px;
  text-decoration:none;
}

.social-icons a span{ font-size:14px; margin-top:5px; }

.facebook{ background:#1877F2; }
.facebook1{ background:#111; }
.instagram{ background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); }
.tiktok{ background:#000; }
.whatsapp{ background:#25D366; }
.youtube{ background:#FF0000; }

/* CONTACT */
.info-card-link{
  margin:15px 10px;
  padding:15px;
  background:white;
  border-radius:12px;
  display:flex;
  align-items:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.25);
  text-decoration:none;
}

.icon-circle{
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
}

/* TEXT */
.instructions{
  margin:15px 10px;
  padding:15px;
  background:#f9f9f9;
  border-radius:12px;
  font-size:18px;
  white-space:pre-line;
}

.map-button{
  margin:20px 10px;
  padding:15px;
  background:#2c7be5;
  color:white;
  text-align:center;
  border-radius:12px;
  display:block;
  text-decoration:none;
}

.create-site{
  text-align:center;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img id="bgContain" class="bg-contain">
    <div class="top-bar"><span id="topName"></span></div>
  </div>

  <div id="userImageCard">
    <img id="userImage">
  </div>

  <div id="placeName"></div>
  <div id="placeDesc"></div>

  <div class="social-icons" id="socialLinks"></div>

  <div id="contactCards"></div>

  <div id="instructions" class="instructions"></div>

  <a id="mapButton" class="map-button">عرض الموقع على الخريطة</a>

  <div class="create-site" id="createSite">
    <a href="https://alpha30-pixel.github.io/template/p.html?id=510326">
      لو عايز تعمل صفحه و كارد زاي دول دوس هنا
    </a>
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const userID = Number(params.get("id"));

fetch("users.json")
.then(res => res.json())
.then(data => {

const user = data.find(u => u.id === userID);

if(!user){
document.body.innerHTML = "<h2 style='text-align:center'>المستخدم غير موجود</h2>";
return;
}

/* BG */
if(user.bgImage){
document.getElementById("bgContain").src = user.bgImage;
}

/* TEXT */
if(user.topName) document.getElementById("topName").textContent = user.topName;

if(user.image){
document.getElementById("userImage").src = user.image;
} else {
document.getElementById("userImageCard").style.display="none";
}

if(user.placeName) document.getElementById("placeName").textContent = user.placeName;
else document.getElementById("placeName").style.display="none";

if(user.placeDesc) document.getElementById("placeDesc").textContent = user.placeDesc;
else document.getElementById("placeDesc").style.display="none";

/* SOCIAL */
const socialEl = document.getElementById("socialLinks");

if(user.social && user.social.length){

user.social.forEach(s => {

let icon = `fab fa-${s.name}`;
let text = s.name;

if(s.name === "facebook1"){
icon = "fab fa-facebook";
text = "facebook";
}

const a = document.createElement("a");
a.href = s.link;
a.target = "_blank";
a.className = s.name;

a.innerHTML = `<i class="${icon}"></i><span>${text}</span>`;

socialEl.appendChild(a);

});

}else{
socialEl.style.display="none";
}

/* CONTACTS */
const contactEl = document.getElementById("contactCards");

if(user.contacts && user.contacts.length){

user.contacts.forEach(c => {

if(!c.main || !c.icon) return;

const a = document.createElement("a");
a.href = c.link || "#";
a.className = "info-card-link";

a.innerHTML = `
<div class="icon-circle"><i class="${c.icon}"></i></div>
<div>
<div>${c.main}</div>
<small>${c.sub || ""}</small>
</div>
`;

contactEl.appendChild(a);

});

}else{
contactEl.style.display="none";
}

/* INSTRUCTIONS */
const inst = document.getElementById("instructions");

if(user.instructions && user.instructions.trim() !== ""){
inst.textContent = user.instructions;
}else{
inst.style.display="none";
}

/* MAP */
const mapBtn = document.getElementById("mapButton");

if(user.mapLink){
mapBtn.href = user.mapLink;
}else{
mapBtn.style.display="none";
}

/* CREATE SITE */
if(user.showCreateSite === false){
document.getElementById("createSite").style.display="none";
}

});

</script>

</body>
</html>
