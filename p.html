<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  padding:0;
  background:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:500px;
  background:white;
  min-height:100vh;
  position:relative;
  padding-bottom:20px;
  margin:auto;
}

.header{
  position:relative;
  width:100%;
  max-width:500px;
  margin:auto;
}

.bg-contain{
  width:100%;
  height:auto;
  display:block;
}

.top-bar{
  position:absolute;
  bottom:10px;
  right:15px;
  color:white;
  font-weight:bold;
  font-size:20px;
  background:rgba(0,0,0,0.4);
  padding:5px 10px;
  border-radius:8px;
}

.header::after{
  content:"";
  display:block;
  width:100%;
  height:15px;
  background:white;
  border-top-left-radius:100% 80px;
  border-top-right-radius:100% 80px;
}

.info-card{
  position:absolute;
  right:20px;
  top:220px;
  width:120px;
  height:120px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  z-index:3;
}

.info-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.place-name{
  margin-top:90px;
  padding-right:20px;
  text-align:right;
  font-size:24px;
  font-weight:bold;
  color:#2c7be5;
}

.place-desc{
  padding-right:20px;
  text-align:right;
  font-size:20px;
  font-weight:bold;
  color:black;
  line-height:1.6;
  margin-top:5px;
}

.follow{
  margin-top:25px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.social-icons{
  margin-top:15px;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
}

.social-icons a{
  flex:1;
  margin:0 5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:80px;
  border-radius:12px;
  color:white;
  font-size:28px;
  transition:0.3s;
  text-decoration:none;
}

.social-icons a span{
  font-size:14px;
  margin-top:5px;
}

.social-icons a.facebook{ background:#1877F2; }

.social-icons a.facebook1{ background:#111; }

.social-icons a.instagram{
  background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
}

.social-icons a.tiktok{ background:#010101; }
.social-icons a.whatsapp{ background:#25D366; }
.social-icons a.youtube{ background:#FF0000; }

.info-card-link{
  margin:15px 10px;
  padding:15px;
  background:white;
  border-radius:12px;
  display:flex;
  align-items:center;
  cursor:pointer;
  box-shadow:0 4px 15px rgba(0,0,0,0.25);
  text-decoration:none;
}

.icon-circle{
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
  color:#000;
}

.info-text{
  display:flex;
  flex-direction:column;
}

.info-main{
  font-size:18px;
  font-weight:bold;
  color:#000;
}

.info-sub{
  font-size:14px;
  color:#555;
}

.instructions{
  margin:15px 10px;
  padding:15px;
  background:#f9f9f9;
  border-radius:12px;
  font-size:18px;
  white-space: pre-line;
}

.map-button{
  margin:20px 10px;
  padding:15px;
  background:#2c7be5;
  color:white;
  text-align:center;
  border-radius:12px;
  text-decoration:none;
  display:block;
}

.create-site{
  text-align:center;
  margin-top:15px;
}

.create-site a{
  color:#000;
  font-size:20px;
  text-decoration:none;
  border-bottom:1px dashed #aaa;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <img id="bgContain" class="bg-contain" />
    <div class="top-bar"><span id="topName"></span></div>
  </div>

  <div class="info-card" id="userImageCard">
    <img src="" id="userImage">
  </div>

  <div class="place-name" id="placeName"></div>
  <div class="place-desc" id="placeDesc"></div>

  <div class="follow">تابعونا على</div>
  <div class="social-icons" id="socialLinks"></div>

  <div id="contactCards"></div>
  <div class="instructions" id="instructions"></div>

  <a href="#" target="_blank" class="map-button" id="mapButton">عرض الموقع على الخريطة</a>

  <div class="create-site" id="createSite">
    <a href="https://alpha30-pixel.github.io/template/p.html?id=510326" target="_blank">
      لو عايز تعمل صفحه و كارد زاي دول دوس هنا
    </a>
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const userID = Number(params.get("id"));

fetch("users.json")
.then(res => res.json())
.then(usersData => {

const user = usersData.find(u => u.id === userID);

if(!user){
document.body.innerHTML = "<h2 style='text-align:center'>المستخدم غير موجود</h2>";
return;
}

document.getElementById("bgContain").src = user.bgImage || "";
if(user.topName) document.getElementById("topName").textContent = user.topName;
if(user.image) document.getElementById("userImage").src = user.image;
else document.getElementById("userImageCard").style.display = "none";

if(user.placeName) document.getElementById("placeName").textContent = user.placeName;
else document.getElementById("placeName").style.display = "none";

if(user.placeDesc) document.getElementById("placeDesc").textContent = user.placeDesc;
else document.getElementById("placeDesc").style.display = "none";

const socialEl = document.getElementById("socialLinks");

if(user.social){
user.social.forEach(s => {

const a = document.createElement("a");
a.href = s.link;
a.target = "_blank";

/* تحديد النوع */
let showText = true;
let icon = `fab fa-${s.name}`;

if(s.name === "facebook1"){
  showText = false;
  icon = "fab fa-facebook";
}

/* كلاس */
a.className = s.name;

/* HTML */
a.innerHTML = `
  <i class="${icon}"></i>
  ${showText ? `<span>${s.name}</span>` : ""}
`;

socialEl.appendChild(a);

});
}else{
socialEl.style.display = "none";
}

});

</script>

</body>
</html>
