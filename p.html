<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Mobile Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  padding:0;
  background:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
}
.container{
  width:100%;
  max-width:500px;
  background:white;
  min-height:100vh;
  position:relative;
  padding-bottom:20px;
}
.header{
  position:relative;
  height:25vh;
  background:url("image/bg.jpg") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}
.top-bar{
  display:flex;
  align-items:center;
  gap:20px;
  color:white;
  font-weight:bold;
  font-size:22px;
  letter-spacing:4px;
}
.top-bar img{
  width:70px;
  height:70px;
  object-fit:contain;
  order:2;
}
.top-bar span{
  order:1;
}
.header::after{
  content:"";
  position:absolute;
  bottom:-1px;
  left:0;
  width:100%;
  height:15px;
  background:white;
  border-top-left-radius:100% 80px;
  border-top-right-radius:100% 80px;
}
.info-card{
  position:absolute;
  right:20px;
  top:calc(25vh - 70px);
  width:120px;
  height:120px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
.info-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.place-name{
  margin-top:90px;
  padding-right:20px;
  text-align:right;
  font-size:24px;
  font-weight:bold;
  color:#2c7be5;
}
.place-desc{
  padding-right:20px;
  text-align:right;
  font-size:24px;
  font-weight:1000;
  color:#222;
  line-height:1.6;
  margin-top:5px;
}
.follow{
  margin-top:25px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
.social-icons{
  margin-top:15px;
  display:flex;
  justify-content:space-between;
  padding:0 10px;
}
.social-icons a{
  flex:1;
  margin:0 5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:80px;
  border-radius:12px;
  color:white;
  font-size:28px;
  transition:0.3s;
  text-decoration:none;
}
.social-icons a span{
  font-size:14px;
  margin-top:5px;
}
.social-icons a.facebook{ background:#1877F2; }
.social-icons a.instagram{
  background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
}
.social-icons a.tiktok{ background: #010101; }
.social-icons a.whatsapp{ background: #25D366; }
.social-icons a:hover{
  transform:scale(1.05);
}
.info-card-link{
  margin:15px 10px;
  padding:15px;
  background:white;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  cursor:pointer;
  box-shadow:0 4px 15px rgba(0,0,0,0.25);
  transition:0.3s;
  text-decoration:none;
  position:relative;
}
.info-card-link:hover{
  background:#f0f0f0;
}
.icon-circle{
  width:40px;
  height:40px;
  border-radius:50%;
  background:rgba(0,0,0,0.05);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:10px;
  flex-shrink:0;
}
.info-card-link i{
  font-size:20px;
  color:#000;
}
.info-text{
  display:flex;
  flex-direction:column;
  text-align:left;
}
.info-main{
  font-size:18px;
  font-weight:bold;
  color:#000;
}
.info-sub{
  font-size:14px;
  font-weight:300;
  color:#555;
  margin-top:3px;
}
.instructions{
  margin:15px 10px;
  padding:15px;
  background:#f9f9f9;
  border-radius:12px;
  color:#222;
  font-size:18px;
  line-height:1.5;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.map-button{
  margin:20px 10px;
  padding:15px;
  background:#2c7be5;
  color:white;
  font-size:18px;
  font-weight:bold;
  text-align:center;
  border-radius:12px;
  text-decoration:none;
  display:block;
  transition:0.3s;
}
.map-button:hover{
  background:#1a5fb4;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="top-bar">
      <span id="topName">TEEM ALPHA</span>
    </div>
  </div>

  <div class="info-card" id="userImageCard">
    <img src="image/TA.png" id="userImage">
  </div>

  <div class="place-name" id="placeName">ALPHA</div>
  <div class="place-desc" id="placeDesc">بنختلف عن غيرنا كتير و بنساعدك تكون مختلف</div>

  <div class="follow">تابعونا على</div>
  <div class="social-icons" id="socialLinks"></div>

  <div id="contactCards"></div>

  <div class="instructions" id="instructions">الرجاء الالتزام بالمواعيد، ارتداء الكمامة، واحترام تعليمات المكان.</div>

  <a href="#" target="_blank" class="map-button" id="mapButton">عرض الموقع على الخريطة</a>

</div>

<script>
// Example: users.json
const usersData = [
  {
    "id":1,
    "topName":"TEEM ALPHA",
    "image":"image/TA.png",
    "placeName":"ALPHA",
    "placeDesc":"بنختلف عن غيرنا كتير و بنساعدك تكون مختلف",
    "social":[
      {"name":"facebook","link":"https://facebook.com"},
      {"name":"instagram","link":"https://instagram.com"},
      {"name":"tiktok","link":"https://tiktok.com"},
      {"name":"whatsapp","link":"https://wa.me/01150519460"}
    ],
    "contacts":[
      {"type":"phone","icon":"fas fa-phone","main":"01150519460","sub":"رقم الهاتف","link":"tel:01150519460"},
      {"type":"email","icon":"fas fa-envelope","main":"info@example.com","sub":"البريد الإلكتروني","link":"mailto:info@example.com"},
      {"type":"address","icon":"fas fa-map-marker-alt","main":"شارع العادلي - العزيزيه - البدرشين","sub":"العنوان","link":"https://www.google.com/maps/search/%D8%B4%D8%A7%D8%B1%D8%B9+%D8%A7%D9%84%D8%B9%D8%A7%D8%AF%D9%84%D9%8A+-+%D8%A7%D9%84%D8%B9%D8%B2%D9%8A%D8%B2%D9%8A%D9%87+-+%D8%A7%D9%84%D8%A8%D8%AF%D8%B1%D8%B4%D9%8A%D9%86"}  
    ],
    "instructions":"الرجاء الالتزام بالمواعيد، ارتداء الكمامة، واحترام تعليمات المكان.",
    "mapLink":"https://www.google.com/maps/search/%D8%B4%D8%A7%D8%B1%D8%B9+%D8%A7%D9%84%D8%B9%D8%A7%D8%AF%D9%84%D9%8A+-+%D8%A7%D9%84%D8%B9%D8%B2%D9%8A%D8%B2%D9%8A%D9%87+-+%D8%A7%D9%84%D8%A8%D8%AF%D8%B1%D8%B4%D9%8A%D9%86"
  }
];

// Load user by ID (for example ID = 1)
const userID = 1;
const user = usersData.find(u => u.id === userID);

if(user){
  // Top name
  document.getElementById('topName').textContent = user.topName || '';

  // User image
  if(user.image){
    document.getElementById('userImage').src = user.image;
  } else {
    document.getElementById('userImageCard').style.display = 'none';
  }

  // Place name
  const placeNameEl = document.getElementById('placeName');
  if(user.placeName) placeNameEl.textContent = user.placeName;
  else placeNameEl.style.display = 'none';

  // Place desc
  const placeDescEl = document.getElementById('placeDesc');
  if(user.placeDesc) placeDescEl.textContent = user.placeDesc;
  else placeDescEl.style.display = 'none';

  // Social links
  const socialEl = document.getElementById('socialLinks');
  socialEl.innerHTML = '';
  if(user.social && user.social.length){
    user.social.forEach(s=>{
      const a = document.createElement('a');
      a.href = s.link;
      a.target="_blank";
      a.className = s.name;
      a.innerHTML = `<i class="fab fa-${s.name}"></i><span>${s.name.charAt(0).toUpperCase() + s.name.slice(1)}</span>`;
      socialEl.appendChild(a);
    });
  } else socialEl.style.display='none';

  // Contacts
  const contactsEl = document.getElementById('contactCards');
  contactsEl.innerHTML = '';
  if(user.contacts && user.contacts.length){
    user.contacts.forEach(c=>{
      const a = document.createElement('a');
      a.href = c.link;
      a.className='info-card-link';
      a.innerHTML = `
        <div class="icon-circle"><i class="${c.icon}"></i></div>
        <div class="info-text">
          <span class="info-main">${c.main}</span>
          <span class="info-sub">${c.sub}</span>
        </div>
      `;
      contactsEl.appendChild(a);
    });
  }

  // Instructions
  const instrEl = document.getElementById('instructions');
  if(user.instructions) instrEl.textContent = user.instructions;
  else instrEl.style.display='none';

  // Map button
  const mapBtn = document.getElementById('mapButton');
  if(user.mapLink) mapBtn.href = user.mapLink;
  else mapBtn.style.display='none';
}
</script>

</body>
</html>
